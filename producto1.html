<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="titulo-pagina">Producto</title>
  <link rel="stylesheet" href="producto1.css" />
  <link rel="icon" type="image/x-icon" href="./img/logoarpag.ico" />
</head>
<body>

  <main class="producto-card">
    <div class="galeria">
      <div class="carrusel">
        <img id="img-principal" src="" alt="Producto" />
        <button class="prev" onclick="cambiarImagen(-1)">‹</button>
        <button class="next" onclick="cambiarImagen(1)">›</button>
      </div>
      <div class="miniaturas" id="miniaturas"></div>
    </div>

    <div class="info-producto">
      <h1 id="nombre-producto"></h1>
      <p class="precio" id="precio-producto"></p>
      <p>Envío: $7500</p>
      <p class="descripcion" id="descripcion-producto"></p>
    </div>

    <!-- Datos del comprador -->
    <div class="datos-comprador">
      <h2>Datos del comprador</h2>
      <form id="form-comprador">
        <label for="nombre">Nombre y apellido:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="domicilio">Domicilio:</label>
        <input type="text" id="domicilio" name="domicilio" required>

        <label for="localidad">Localidad:</label>
        <input type="text" id="localidad" name="localidad" required>

        <label for="codigo-postal">Código postal:</label>
        <input type="text" id="codigo-postal" name="codigo-postal" required>

        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" required>

        <label for="correo">Correo:</label>
        <input type="email" id="correo" name="correo" required>

        <button type="submit" class="btn-comprar">Enviar datos</button>
      </form>
    </div>

    <!-- Botón de Mercado Pago -->
    <div class="boton-mercado-pago">
      <script 
        src="https://www.mercadopago.com.ar/integrations/v1/web-payment-checkout.js"
        data-preference-id="1100840325-e88e0c1d-fa74-428d-a12e-8a36f06d2b98"
        data-source="button">
      </script>
    </div>
  </main>

  <script src="producto1.js"></script>
</body>
</html>
