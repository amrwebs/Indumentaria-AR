<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="titulo-pagina">Producto</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body>
  <main class="container mt-5">
    <div class="row">
      <div class="col-md-6 text-center">
        <div class="carrusel position-relative">
          <img id="img-principal" src="" alt="Producto" class="img-fluid rounded" />
          <button class="btn btn-dark position-absolute top-50 start-0" onclick="cambiarImagen(-1)">‹</button>
          <button class="btn btn-dark position-absolute top-50 end-0" onclick="cambiarImagen(1)">›</button>
        </div>
        <div id="miniaturas" class="d-flex justify-content-center mt-2 gap-2"></div>
      </div>

      <div class="col-md-6">
        <h1 id="nombre-producto"></h1>
        <p class="h4 text-success" id="precio-producto"></p>
        <p>Envío: $7500</p>
        <p id="descripcion-producto"></p>

        <h2 class="mt-4">Datos del comprador</h2>
        <form id="form-comprador">
          <input type="text" id="nombre" placeholder="Nombre y apellido" class="form-control mb-2" required>
          <input type="text" id="domicilio" placeholder="Domicilio" class="form-control mb-2" required>
          <input type="text" id="localidad" placeholder="Localidad" class="form-control mb-2" required>
          <input type="text" id="codigo-postal" placeholder="Código postal" class="form-control mb-2" required>
          <input type="tel" id="telefono" placeholder="Teléfono" class="form-control mb-2" required>
          <input type="email" id="correo" placeholder="Correo electrónico" class="form-control mb-3" required>
          <button type="submit" class="btn btn-success">Enviar datos</button>
        </form>

        <div class="boton-mercado-pago mt-3">
          <script 
            src="https://www.mercadopago.com.ar/integrations/v1/web-payment-checkout.js"
            data-preference-id="1100840325-e88e0c1d-fa74-428d-a12e-8a36f06d2b98"
            data-source="button">
          </script>
        </div>
      </div>
    </div>
  </main>

  <script src="{{ url_for('static', filename='producto1.js') }}"></script>
</body>
</html>
